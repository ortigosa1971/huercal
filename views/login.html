<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Iniciar sesión</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white flex flex-col items-center justify-center min-h-screen px-4">
    <h2 class="text-3xl font-bold mb-6">Iniciar sesión</h2>
    <form method="POST" action="/login" class="flex flex-col gap-4 w-11/12 max-w-sm">
        <div>
            <label>Usuario:</label>
            <input type="text" name="usuario" required class="w-full p-2 text-black rounded" placeholder="Ingresa tu nombre de usuario" />
        </div>
        <button type="submit" class="bg-blue-500 hover:bg-blue-600 py-2 px-4 rounded">Entrar</button>
    </form>

    <!-- Mensaje de error si el usuario no existe o hay una sesión activa -->
    <div id="mensaje-error" class="hidden fixed inset-0 bg-black bg-opacity-80 flex items-center justify-center z-50">
        <p class="text-red-600 text-3xl font-extrabold text-center px-6">
            ⚠️ Usuario no encontrado o sesión activa detectada.<br>Por favor, inténtalo de nuevo.
        </p>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);

        // Mostrar mensaje de error si no se encuentra el usuario o hay sesión activa
        if (params.get('error') === '1' || params.get('error') === 'sesion') {
            document.getElementById('mensaje-error').classList.remove('hidden');
        }
    </script>
</body>
</html>
